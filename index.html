<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人靜態網頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #8ec5fc;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: white;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #222;
        }
        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .links a {
            display: block;
            background: #8ec5fc;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .links a:hover {
            background: #76b4f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118,180,245,0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 頭像區：您可以把 👋 換成圖片網址，例如 <img src="avatar.jpg" class="avatar"> -->
        <div class="avatar">👋</div>
        
        <h1>歡迎來到我的網站</h1>
        <p>這是一個使用 HTML 與 CSS 建立的純靜態網頁。設計簡潔、載入速度極快，非常適合用作個人名片或作品集連結導向。</p>
        
        <div class="links">
            <a href="https://github.com" target="_blank">我的 GitHub</a>
            <a href="#" onclick="alert('聯絡信箱：your-email@example.com')">聯絡我</a>
        </div>
    </div>

</body>
</html>
